<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200">
  <rect width="520" height="200" rx="14" fill="#fff7f7"/>
  <rect x="1" y="1" width="518" height="198" rx="13" fill="none" stroke="#fecaca" stroke-width="1.5"/>
  <text x="30" y="36" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="700" fill="#dc2626">What Happens If You Lock a Modified Device?</text>
  <!-- Warning icon -->
  <g transform="translate(380,55)">
    <path d="M65 10 L120 100 L10 100 Z" fill="#fef2f2" stroke="#ef4444" stroke-width="3" stroke-linejoin="round"/>
    <line x1="65" y1="40" x2="65" y2="72" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
    <circle cx="65" cy="85" r="4" fill="#ef4444"/>
  </g>
  <!-- Scenario items -->
  <g transform="translate(30,56)">
    <circle cx="7" cy="7" r="7" fill="#ef4444"/>
    <line x1="7" y1="4" x2="7" y2="10" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <circle cx="7" cy="11.5" r="1.2" fill="white"/>
    <text x="22" y="11" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#1e293b" font-weight="600">Hard Brick / Boot Loop</text>
    <text x="22" y="26" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#64748b">If a custom kernel or ROM is installed, the device will fail</text>
    <text x="22" y="40" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#64748b">the signature verification check and refuse to boot.</text>
  </g>
  <g transform="translate(30,108)">
    <circle cx="7" cy="7" r="7" fill="#ef4444"/>
    <line x1="7" y1="4" x2="7" y2="10" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <circle cx="7" cy="11.5" r="1.2" fill="white"/>
    <text x="22" y="11" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#1e293b" font-weight="600">Data Wiped Permanently</text>
    <text x="22" y="26" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#64748b">The lock command wipes all data regardless. If the device</text>
    <text x="22" y="40" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#64748b">bricks, you lose everything with no way to recover it.</text>
  </g>
  <g transform="translate(30,160)">
    <rect x="0" y="0" width="340" height="28" rx="6" fill="#fee2e2"/>
    <text x="12" y="18" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#b91c1c" font-weight="600">Rule: Only lock on a fully stock, unmodified device. No exceptions.</text>
  </g>
</svg>
