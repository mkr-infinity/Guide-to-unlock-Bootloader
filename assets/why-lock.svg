<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="520" height="180">
  <rect width="520" height="180" rx="14" fill="#f0fdf4"/>
  <rect x="1" y="1" width="518" height="178" rx="13" fill="none" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="30" y="36" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="700" fill="#15803d">Why Lock the Bootloader?</text>
  <!-- Benefits -->
  <g transform="translate(30,55)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#22c55e"/>
    <polyline points="2,7 6,11 12,3" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <text x="22" y="11" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#1e293b"><tspan font-weight="600">Android Verified Boot (AVB)</tspan> — device verifies system integrity on every boot</text>
  </g>
  <g transform="translate(30,80)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#22c55e"/>
    <polyline points="2,7 6,11 12,3" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <text x="22" y="11" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#1e293b"><tspan font-weight="600">Banking &amp; Payment Apps</tspan> — Google Pay, PhonePe, BHIM work only with locked bootloader</text>
  </g>
  <g transform="translate(30,105)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#22c55e"/>
    <polyline points="2,7 6,11 12,3" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <text x="22" y="11" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#1e293b"><tspan font-weight="600">SafetyNet / Play Integrity</tspan> — apps that check device security pass correctly</text>
  </g>
  <g transform="translate(30,130)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#22c55e"/>
    <polyline points="2,7 6,11 12,3" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <text x="22" y="11" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#1e293b"><tspan font-weight="600">Physical Attack Protection</tspan> — no one can boot a malicious OS even with USB access</text>
  </g>
</svg>
